<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Dream Quests</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

input{
width:80%;
padding:12px;
border:none;
border-radius:10px;
margin:10px;
}

button{
padding:12px 20px;
background:#38bdf8;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.quest{
background:rgba(255,255,255,0.08);
padding:15px;
margin-top:15px;
border-radius:12px;
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

a{
display:inline-block;
margin-top:25px;
padding:10px 20px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>🏆 Dream Quests</h1>

<p>Turn your dreams into missions.</p>

<input
type="text"
id="questInput"
placeholder="Enter your dream or goal">

<button onclick="addQuest()">
➕ Add Quest
</button>

<div id="questList"></div>

<a href="index.html">🏠 Back Home</a>

</div>

<script>

function addQuest(){

let quest=
document.getElementById("questInput").value;

if(quest===""){
alert("Enter a goal first!");
return;
}

let div=
document.createElement("div");

div.className="quest";

div.innerHTML=`
<h3>${quest}</h3>
<button onclick="completeQuest(this)">
✅ Complete
</button>
`;

document
.getElementById("questList")
.appendChild(div);

document
.getElementById("questInput")
.value="";

}

function completeQuest(btn){

let parent=
btn.parentElement;

parent.classList.add("completed");

btn.innerHTML="🏅 Completed";

btn.disabled=true;

}

</script>

</body>
</html>
